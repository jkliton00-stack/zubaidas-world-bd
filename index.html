<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zubaida's World BD</title>

<style>
body {font-family:sans-serif;margin:0;background:#fff5f8;}
header {background:#ff4081;color:white;text-align:center;padding:15px;}

.container {display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px;}

.product {background:white;padding:10px;border-radius:10px;text-align:center;}
.product img {width:100%;border-radius:10px;}

button {background:#ff4081;color:white;border:none;padding:8px;width:100%;margin-top:5px;}

.cart {background:#fff;padding:10px;margin:10px;border-radius:10px;}

input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
}

footer {background:#222;color:white;text-align:center;padding:10px;}
</style>

</head>

<body>

<header>
<h2>Zubaida's World BD 👗</h2>
<p>Cash on Delivery + bKash Available</p>
</header>

<div class="container" id="products"></div>

<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<p id="total"></p>

<h3>📦 Order Form</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Address">

<select id="payment">
<option>Cash on Delivery</option>
<option>bKash</option>
</select>

<button onclick="placeOrder()">Place Order</button>
</div>

<footer>
<p>📞 bKash: 01740721428</p>
</footer>

<script>

let products = [
{name:"Kids Dress", price:799, img:"https://via.placeholder.com/200"},
{name:"Women 3 Piece", price:999, img:"https://via.placeholder.com/200"},
{name:"Men T-Shirt", price:599, img:"https://via.placeholder.com/200"}
];

let cart = [];

let container = document.getElementById("products");

products.forEach((p,i)=>{
  container.innerHTML += `
  <div class="product">
    <img src="${p.img}">
    <h4>${p.name}</h4>
    <p>৳${p.price}</p>
    <button onclick="addToCart(${i})">Add to Cart</button>
  </div>
  `;
});

function addToCart(i){
  cart.push(products[i]);
  showCart();
}

function showCart(){
  let items = "";
  let total = 0;

  cart.forEach(p=>{
    items += p.name + " - ৳" + p.price + "<br>";
    total += p.price;
  });

  document.getElementById("cartItems").innerHTML = items;
  document.getElementById("total").innerHTML = "Total: ৳" + total;
}

function placeOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let payment = document.getElementById("payment").value;

  let order = "Order from Zubaida's World BD%0A";
  cart.forEach(p=>{
    order += p.name + " - ৳" + p.price + "%0A";
  });

  order += "Total: ৳" + cart.reduce((a,b)=>a+b.price,0);
  order += "%0AName: " + name;
  order += "%0APhone: " + phone;
  order += "%0AAddress: " + address;
  order += "%0APayment: " + payment;

  window.open("https://wa.me/8801740721428?text=" + order);
}

</script>

</body>
</html>
