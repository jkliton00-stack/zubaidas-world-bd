<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zubaida's World BD</title>

<style>
body {margin:0;font-family:sans-serif;background:#fff5f8;}

header {background:#ff4081;color:white;padding:15px;text-align:center;}

.search {
  width:90%;
  padding:10px;
  margin:10px auto;
  display:block;
  border-radius:20px;
  border:none;
}

.banner {
  background:#ff4081;
  color:white;
  text-align:center;
  padding:30px;
}

.categories {
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.cat {
  background:white;
  padding:10px;
  border-radius:10px;
  width:30%;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.product {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.product img {width:100%;border-radius:10px;}

.price {color:#ff4081;font-weight:bold;}

button {
  background:#ff4081;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  margin-top:5px;
}

footer {
  background:#222;
  color:white;
  text-align:center;
  padding:10px;
}
</style>

</head>

<body>

<header>
<h2>Zubaida's World BD 👗</h2>
</header>

<input class="search" placeholder="Search your dress...">

<div class="banner">
<h3>🔥 SALE UP TO 50% OFF</h3>
<p>Cash on Delivery + bKash Available</p>
</div>

<div class="categories">
<div class="cat">👶 Kids</div>
<div class="cat">👗 Women</div>
<div class="cat">👕 Men</div>
</div>

<h3 style="text-align:center;">Trending Products</h3>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h4>Baby Dress</h4>
<p class="price">৳699</p>
<button onclick="orderNow('Baby Dress',699)">Order Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h4>Stylish Kurti</h4>
<p class="price">৳899</p>
<button onclick="orderNow('Kurti',899)">Order Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h4>Men T-Shirt</h4>
<p class="price">৳599</p>
<button onclick="orderNow('T-Shirt',599)">Order Now</button>
</div>

</div>

<footer>
<p>📞 bKash: 01740721428</p>
<p>Order via WhatsApp</p>
</footer>

<script>
function orderNow(product, price){
  let text = "I want to order: " + product + " Price: " + price + "৳";
  window.open("https://wa.me/8801740721428?text=" + text);
}
</script>

</body>
</html>
